<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src https://s3.tradingview.com https://*.tradingview.com https://*.tradingview-widget.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://*.tradingview.com https://*.tradingview-widget.com; img-src 'self' data: https://*.tradingview.com https://*.tradingview-widget.com; connect-src https://*.tradingview.com https://*.tradingview-widget.com wss://*.tradingview.com wss://*.tradingview-widget.com; frame-src https://*.tradingview.com https://*.tradingview-widget.com; font-src data: https://*.tradingview.com https://*.tradingview-widget.com;" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <style>
    html, body { margin: 0; padding: 0; background: #121212; overflow: hidden; }
    .tradingview-widget-container, .tradingview-widget-container__widget { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <script>
    function syncSize() {
      var px = window.innerHeight + "px";
      document.documentElement.style.height = px;
      document.body.style.height = px;
    }
    syncSize();
    window.addEventListener("resize", syncSize);
  </script>
  <div class="tradingview-widget-container">
    <div class="tradingview-widget-container__widget"></div>
    <script type="text/javascript" src="{{SCRIPT_SRC}}" async>
    {{CONFIG}}
    </script>
  </div>
</body>
</html>
